version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - LLM_BASE_URL=https://api.fireworks.ai/inference/v1
      - LLM_MODEL=accounts/fireworks/models/qwen3p7-plus

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
